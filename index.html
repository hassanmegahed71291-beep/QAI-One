<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AQL Assistant — Alpha Omega Egypt</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Tahoma,Arial,sans-serif;background:#1a1a2e;color:#eee;min-height:100vh;direction:rtl}
.wrap{max-width:500px;margin:0 auto;display:flex;flex-direction:column;min-height:100vh}
.hdr{background:linear-gradient(135deg,#16213e,#0f3460);padding:10px 14px 8px;text-align:center;border-bottom:2px solid #e94560}
.logo{font-size:17px;font-weight:700;background:linear-gradient(90deg,#e94560,#a8edea);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.h1{font-size:1rem;color:#fff;font-weight:700;margin:3px 0}
.sub{font-size:.72rem;color:#a0b4d0}
.tabs{display:flex;background:#16213e;border-bottom:1px solid #2a3a5c}
.tab{flex:1;padding:10px 2px;text-align:center;cursor:pointer;font-size:.68rem;color:#7a8fa6;border-bottom:3px solid transparent;font-weight:400;white-space:nowrap;transition:.2s}
.tab.active{color:#e94560;border-bottom-color:#e94560;font-weight:700}
.gt{display:flex;gap:8px;padding:7px 12px;background:#16213e;border-bottom:1px solid #2a3a5c}
.gtb{flex:1;padding:6px;border:1.5px solid #2a3a5c;background:transparent;color:#a0b4d0;border-radius:8px;cursor:pointer;font-size:.78rem;transition:.2s}
.gtb.active{background:#e94560;border-color:#e94560;color:#fff;font-weight:700}
#area{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:8px;height:calc(100vh - 255px)}
.bot{max-width:90%;padding:10px 12px;border-radius:14px;font-size:.83rem;line-height:1.65;background:#16213e;border:1px solid #2a3a5c;align-self:flex-start;color:#d0e0f0;white-space:pre-wrap}
.usr{max-width:90%;padding:10px 12px;border-radius:14px 14px 4px 14px;font-size:.83rem;line-height:1.65;background:#e94560;color:#fff;align-self:flex-end}
.qrw{display:flex;flex-wrap:wrap;gap:5px;padding:6px 10px;background:#16213e;border-top:1px solid #2a3a5c;min-height:40px}
.qrb{padding:5px 9px;background:transparent;border:1.5px solid #e94560;color:#e94560;border-radius:18px;cursor:pointer;font-size:.7rem;white-space:nowrap;font-family:inherit;transition:.2s}
.qrb:hover{background:#e94560;color:#fff}
.inr{display:flex;gap:7px;padding:8px 10px;background:#16213e;border-top:1px solid #2a3a5c}
#inp{flex:1;padding:9px 12px;border-radius:20px;border:1.5px solid #2a3a5c;background:#0f1929;color:#eee;font-size:.83rem;outline:none;direction:rtl;font-family:inherit}
#inp:focus{border-color:#e94560}
#snd{padding:9px 15px;background:#e94560;border:none;color:#fff;border-radius:20px;cursor:pointer;font-size:.85rem;font-weight:700}
.dfc{background:#0f1929;border:1px solid #2a3a5c;border-radius:10px;padding:8px 10px;margin-bottom:4px}
.dfn{font-weight:700;font-size:.83rem;color:#e0e8f0}
.dfa{color:#7a8fa6;font-size:.78rem;margin-top:2px}
.bdg{display:inline-block;padding:2px 7px;border-radius:10px;font-size:.67rem;font-weight:700;margin-top:3px}
.bdg-Critical{background:#ff4757;color:#fff}
.bdg-Major{background:#ff6b35;color:#fff}
.bdg-Minor{background:#ffa502;color:#000}
.ib{background:#0f1929;border-right:3px solid #e94560;border-radius:0 8px 8px 0;padding:8px 11px;margin:4px 0;font-size:.81rem;line-height:1.7;color:#c0d0e0}
.qcard{background:#0f1929;border:1.5px solid #2a3a5c;border-radius:12px;padding:12px;margin:4px 0}
.qopt{width:100%;padding:8px 12px;border:1.5px solid #2a3a5c;background:transparent;color:#a0b4d0;border-radius:9px;cursor:pointer;text-align:right;font-size:.8rem;margin-bottom:6px;font-family:inherit;display:block;transition:.2s}
.qopt:hover:not(:disabled){background:#1a2a4a;border-color:#e94560;color:#fff}
.qopt.correct{background:#1a4a2a!important;border-color:#2ed573!important;color:#2ed573!important}
.qopt.wrong{background:#4a1a1a!important;border-color:#ff4757!important;color:#ff4757!important}
.qfb-pass{padding:8px 10px;border-radius:8px;background:#1a4a2a;color:#2ed573;font-size:.78rem;font-weight:600;line-height:1.5;margin-top:4px}
.qfb-fail{padding:8px 10px;border-radius:8px;background:#4a1a1a;color:#ff4757;font-size:.78rem;font-weight:600;line-height:1.5;margin-top:4px}
.crt{background:#0f1929;border:2px solid #e94560;border-radius:16px;padding:16px 14px;text-align:center;margin:8px 0;position:relative;overflow:hidden}
.crt::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#e94560,#a8edea,#e94560)}
.tip{background:linear-gradient(135deg,#0f2a1a,#0f1929);border:1.5px solid #2ed573;border-radius:12px;padding:12px;margin:4px 0}
.prw{background:#2a3a5c;border-radius:10px;height:7px;margin:5px 0;overflow:hidden}
.prb{height:7px;border-radius:10px;background:linear-gradient(90deg,#e94560,#a8edea);transition:width .4s}
.nmw{background:#0f1929;border:1.5px solid #2a3a5c;border-radius:12px;padding:14px;margin:8px 0}
.nmw input{width:100%;padding:9px 12px;border-radius:9px;border:1.5px solid #2a3a5c;background:#16213e;color:#eee;font-size:.9rem;outline:none;font-family:inherit;direction:rtl;margin:8px 0;box-sizing:border-box}
.nmw input:focus{border-color:#e94560}
.sbar{background:#16213e;border:1px solid #2a3a5c;border-radius:9px;padding:8px 12px;display:flex;justify-content:space-between;font-size:.78rem;margin-bottom:5px}
.sv{font-size:1.1rem;font-weight:700;color:#e94560}
.clean-good{border-radius:10px;overflow:hidden;border:2px solid #2ed573;margin:6px 0}
.clean-bad{border-radius:10px;overflow:hidden;border:2px solid #ff4757;margin:6px 0}
.clean-good img,.clean-bad img{width:100%;height:180px;object-fit:cover;display:block}
.clean-good .cl{background:#1a4a2a;color:#2ed573;font-weight:700;padding:7px 12px;text-align:center;font-size:.82rem}
.clean-bad .cl{background:#4a1a1a;color:#ff4757;font-weight:700;padding:7px 12px;text-align:center;font-size:.82rem}
.typing{display:flex;gap:5px;padding:12px;align-self:flex-start}
.typing span{width:7px;height:7px;background:#e94560;border-radius:50%;animation:bn .9s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes bn{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
</style>
</head>
<body>
<div class="wrap">
<div class="hdr">
  <div class="logo">النظافة أساس الجودة ✦</div>
  <div class="h1">🤖 AQL Assistant — by Hassan</div>
  <div class="sub">مدير الجودة | Alpha Omega Egypt</div>
</div>
<div class="tabs">
  <div class="tab active" onclick="switchTab('chat')">💬 شات</div>
  <div class="tab" onclick="switchTab('defects')">👔 عيوب</div>
  <div class="tab" onclick="switchTab('quiz')">🎯 اختبار</div>
  <div class="tab" onclick="switchTab('clean')">🧹 نظافة</div>
  <div class="tab" onclick="switchTab('tip')">💡 نصيحة</div>
</div>
<div class="gt" id="gt">
  <button class="gtb active" onclick="setG('jacket')">👔 جاكيت</button>
  <button class="gtb" onclick="setG('trouser')">👖 بنطلون</button>
</div>
<div id="area"></div>
<div class="qrw" id="qrw"></div>
<div class="inr">
  <input id="inp" placeholder="اسألني أي سؤال... 🤖" onkeydown="if(event.key==='Enter')send()">
  <button id="snd" onclick="send()">➤</button>
</div>
</div>

خبرتك تشمل: نظام AQL، عيوب الملابس (جاكيت، بنطلون، قميص، فستان، معطف، يونيفورم)، جودة الأقمشة، GSM، ثبات اللون، الانكماش، ISO 9001، أدوات الفحص، معايير القياس، والنظافة في بيئة الإنتاج.
أجب على أي سؤال بشكل واضح ومفيد. لا تقل أبداً "لا أعرف" — دائماً قدّم إجابة مفيدة ومختصرة للموبايل.
قواعد: أجب بالعربية دائماً. صنّف العيوب Critical/Major/Minor عند الحاجة.`;

async function askAI(msg){
 const r=await fetch('https://api.anthropic.com/v1/messages',{
  method:'POST',headers:{'Content-Type':'application/json'},
  body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:800,system:SYSTEM,messages:[{role:'user',content:msg}]})
 });
 const d=await r.json();
 return d.content[0].text;
}

function getSample(n){for(const r of SAMPLE_TABLE)if(n>=r[0]&&n<=r[1])return r[2];return 200;}

function quickAns(msg){
 const m=msg.toLowerCase().trim();
 const nm=msg.match(/^\s*(\d+)\s*$/);
 if(nm){const n=parseInt(nm[1]);if(n>0&&n<=10000){const s=getSample(n);return`📐 شحنة ${n} قطعة\nحجم العينة = ${s} قطعة\n🔴 Critical: 0 مسموح\n🟠 Major (AQL 2.5)\n🟡 Minor (AQL 4.0)`;}}
 const found=DEFECTS[curG].filter(d=>d[0].toLowerCase().includes(m)||d[1].includes(msg));
 if(found.length&&m.length<20)return'🔍 نتائج:\n'+found.map(d=>`• ${d[0]} — ${d[1]} [${d[2]}]`).join('\n');
 return null;
}

// DOM helpers
const area=()=>document.getElementById('area');
function addBot(html){const d=document.createElement('div');d.className='bot';d.innerHTML=html;area().appendChild(d);area().scrollTop=99999;}
function addUser(t){const d=document.createElement('div');d.className='usr';d.textContent=t;area().appendChild(d);area().scrollTop=99999;}
function addTyping(){const d=document.createElement('div');d.className='typing';d.id='typ';d.innerHTML='<span></span><span></span><span></span>';area().appendChild(d);area().scrollTop=99999;}
function removeTyping(){const t=document.getElementById('typ');if(t)t.remove();}
function defCard(d){return`<div class="dfc"><div class="dfn">${d[0]}</div><div class="dfa">${d[1]}</div><span class="bdg bdg-${d[2]}">${d[2]}</span></div>`;}
function setQR(list){document.getElementById('qrw').innerHTML=list.map(t=>`<button class="qrb" onclick="qrc('${t.replace(/'/g,"\\'")}')">${t}</button>`).join('');}

async function send(){
 if(loading)return;
 const inp=document.getElementById('inp');
 const msg=inp.value.trim();if(!msg)return;
 if(curTab==='quiz'&&!quizDone){inp.value='';return;}
 addUser(msg);inp.value='';
 const q=quickAns(msg);
 if(q){addBot(q.replace(/\n/g,'<br>'));return;}
 loading=true;addTyping();
 try{const r=await askAI(msg);removeTyping();addBot(r.replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<b>$1</b>'));}
 catch(e){removeTyping();addBot('⚠️ حدث خطأ في الاتصال. حاول مرة أخرى.');}
 finally{loading=false;area().scrollTop=99999;}
}

function qrc(t){document.getElementById('inp').value=t;send();}

// TAB SWITCHING
function switchTab(tab){
 curTab=tab;
 document.querySelectorAll('.tab').forEach((el,i)=>{el.classList.toggle('active',['chat','defects','quiz','clean','tip'][i]===tab);});
 document.getElementById('gt').style.display=(tab==='chat'||tab==='defects')?'flex':'none';
 area().innerHTML='';
 document.getElementById('qrw').innerHTML='';
 document.getElementById('inp').style.display=tab==='quiz'?'none':'flex';
 document.getElementById('snd').style.display=tab==='quiz'?'none':'flex';
 if(tab==='chat'){
  setQR(['AQL إيه هو؟','خطوات الفحص','Critical vs Major','حجم العينة','مصطلحات','أدوات الفحص','رسالة الفريق','فرق الأقمشة 🧵','حساب GSM','ISO 9001 إيه هو؟']);
  addBot('أهلاً يا فريق Alpha Omega! 👋<br><br>أنا <b>AQL Assistant</b> بتاع Hassan مدير الجودة.<br><br>اسألني <b>أي سؤال</b> عن الجودة، AQL، العيوب، الملابس، أو أي حاجة تانية — وهجاوب فوراً! 🤖');
 }else if(tab==='defects'){
  setQR(['كل العيوب','خياطة مفتوحة','بقعة','زرار ناقص','مقاس غلط','سحاب معيب','خيوط زيادة']);
  showDefects();
 }else if(tab==='quiz'){
  showQuizName();
 }else if(tab==='clean'){
  showClean();
 }else if(tab==='tip'){
  showTip();
 }
}

function setG(g){
 curG=g;
 document.querySelectorAll('.gtb').forEach((b,i)=>b.classList.toggle('active',['jacket','trouser'][i]===g));
 if(curTab==='defects') showDefects();
 else addBot('تمام! دلوقتي بنشتغل على '+(g==='jacket'?'الجاكيت 👔':'البنطلون 👖'));
}

// DEFECTS
function showDefects(){
 const list=DEFECTS[curG];
 const cr=list.filter(d=>d[2]==='Critical'),ma=list.filter(d=>d[2]==='Major'),mi=list.filter(d=>d[2]==='Minor');
 addBot(`<b>📋 عيوب ${curG==='jacket'?'الجاكيت 👔':'البنطلون 👖'}</b> — إجمالي ${list.length} عيب<br><br><span style="color:#ff4757;font-weight:700">🔴 Critical (${cr.length})</span><br>${cr.map(defCard).join('')}<br><span style="color:#ff6b35;font-weight:700">🟠 Major (${ma.length})</span><br>${ma.map(defCard).join('')}<br><span style="color:#ffa502;font-weight:700">🟡 Minor (${mi.length})</span><br>${mi.map(defCard).join('')}`);
}

// CLEAN
function showClean(){
 addBot(`<b style="color:#e94560;font-size:1rem">🧹 النظافة أساس الجودة</b><br><br><div class="ib">الجودة تبدأ من كل فرد فينا.<br>نظافتك الشخصية ونظافة مكانك هي أول خطوة في ضمان جودة المنتج.<br><b>بيئة نظيفة = تركيز أكتر = أخطاء أقل = جودة أعلى</b><br><br>شكراً لكل واحد في الفريق على التزامه 🙏</div><br><b>📸 شوف الفرق:</b><br><div class="clean-good"><img src="data:image/jpeg;base64,${CLEAN_IMG}" alt="نظيف"><div class="cl">✅ هكذا يجب أن تكون ترابيزتك</div></div><div class="clean-bad"><img src="data:image/jpeg;base64,${DIRTY_IMG}" alt="غير نظيف"><div class="cl">❌ هذا يجب تجنبه تماماً</div></div>`);
}

// TIP
function showTip(){
 const tip=TIPS[tipIdx%TIPS.length];
 addBot(`<div class="tip"><div style="color:#2ed573;font-weight:700;font-size:.92rem;margin-bottom:6px">${tip.i} ${tip.t}</div><div style="color:#c0d0e0;font-size:.83rem;line-height:1.7">${tip.b}</div></div><div class="prw"><div class="prb" style="width:${Math.round(((tipIdx%TIPS.length)+1)/TIPS.length*100)}%"></div></div><div style="color:#7a8fa6;font-size:.75rem;margin-bottom:8px">نصيحة ${(tipIdx%TIPS.length)+1}/${TIPS.length}</div><button class="qrb" onclick="tipIdx++;showTip();area().innerHTML='';">💡 نصيحة تانية</button>`);
}

// QUIZ
function showQuizName(){
 const d=document.createElement('div');d.className='nmw';
 d.innerHTML=`<div style="font-weight:700;color:#e0e8f0;margin-bottom:8px;line-height:1.6">🎯 اختبار تفاعلي — ${QUIZ.length} سؤال<br><span style="font-size:.8rem;color:#a0b4d0">اكتب اسمك عشان تاخد شهادة لو عملت ≥80%</span></div><input id="qname" placeholder="اكتب اسمك هنا..." onkeydown="if(event.key==='Enter')startQuiz()"><button style="width:100%;padding:10px;background:#e94560;border:none;color:#fff;border-radius:10px;cursor:pointer;font-size:.9rem;font-weight:700;font-family:inherit" onclick="startQuiz()">✅ ابدأ الاختبار</button>`;
 area().appendChild(d);
}

function startQuiz(){
 const ni=document.getElementById('qname');
 quizName=(ni&&ni.value.trim())||'عضو الفريق';
 quizUsed=[];quizScore=0;quizDone=false;certData=null;
 quizCur=Math.floor(Math.random()*QUIZ.length);
 area().innerHTML='';
 showQuestion();
}

function showQuestion(){
 const q=QUIZ[quizCur];
 const prog=Math.round((quizUsed.length/QUIZ.length)*100);
 const d=document.createElement('div');
 d.innerHTML=`<div class="sbar"><span>السؤال ${quizUsed.length+1}/${QUIZ.length}</span><span>النقاط: <span class="sv">${quizScore}</span></span></div><div class="prw"><div class="prb" style="width:${prog}%"></div></div><div class="qcard"><div style="font-weight:700;color:#e0e8f0;margin-bottom:10px;line-height:1.55;font-size:.85rem">❓ ${q.q}</div><div id="qopts">${q.o.map((o,i)=>`<button class="qopt" id="qo${i}" onclick="answerQ(${i})">${o}</button>`).join('')}</div><div id="qfb"></div></div>`;
 area().appendChild(d);area().scrollTop=99999;
 quizAnswered=false;quizChosen=-1;
}

function answerQ(i){
 if(quizAnswered)return;
 quizAnswered=true;quizChosen=i;
 const q=QUIZ[quizCur];
 const ok=i===q.a;
 if(ok)quizScore++;
 quizUsed.push(quizCur);
 // Color buttons
 q.o.forEach((_,j)=>{
  const b=document.getElementById('qo'+j);if(!b)return;
  b.disabled=true;
  if(j===q.a)b.classList.add('correct');
  else if(j===i&&!ok)b.classList.add('wrong');
 });
 // Feedback
 const fb=document.getElementById('qfb');
 if(fb){
  fb.innerHTML=`<div class="${ok?'qfb-pass':'qfb-fail'}">${ok?'✅ صح!':'❌ غلط. الإجابة: <b>'+q.o[q.a]+'</b>'}<br><span style="opacity:.85;font-weight:400">${q.e}</span></div><button class="qrb" style="margin-top:8px" onclick="nextQ()">➡️ التالي</button>`;
 }
 area().scrollTop=99999;
}

function nextQ(){
 const rem=QUIZ.map((_,i)=>i).filter(i=>!quizUsed.includes(i));
 if(rem.length===0){showQuizFinal();return;}
 quizCur=rem[Math.floor(Math.random()*rem.length)];
 area().innerHTML='';
 showQuestion();
}

function showQuizFinal(){
 quizDone=true;
 const pct=Math.round((quizScore/QUIZ.length)*100);
 const grade=pct>=90?'🏆 ممتاز':pct>=75?'🥇 جيد جداً':pct>=60?'👍 جيد':'📖 يحتاج مراجعة';
 if(pct>=80) certData={name:quizName,pct,score:quizScore,total:QUIZ.length,date:new Date().toLocaleDateString('ar-EG'),grade};
 const certHtml=certData?`<div class="crt"><div style="font-size:.95rem;font-weight:700;color:#e94560">🎓 شهادة إتمام التدريب</div><div style="font-size:.72rem;color:#7a8fa6;margin:3px 0 10px">Alpha Omega Egypt — AQL System</div><div style="font-size:.78rem;color:#a0b4d0">تشهد شركة Alpha Omega Egypt بأن</div><div style="font-size:1.2rem;font-weight:700;color:#a8edea;padding:8px 0;border-top:1px solid #2a3a5c;border-bottom:1px solid #2a3a5c;margin:6px 0">${certData.name}</div><div style="font-size:.78rem;color:#c0d0e0">أتمّ بنجاح اختبار الجودة والفحص</div><div style="font-size:1.8rem;font-weight:700;color:#e94560;margin:4px 0">${certData.pct}%</div><div style="color:#2ed573;font-weight:600;margin-bottom:8px">${certData.grade}</div><div style="font-size:.7rem;color:#7a8fa6">📅 ${certData.date} | ✍️ Hassan — مدير الجودة</div></div>`:'';
 const d=document.createElement('div');d.className='bot';
 d.innerHTML=`<div style="text-align:center"><div style="font-size:1.2rem;font-weight:700;color:#e94560;margin-bottom:6px">🎉 انتهى الاختبار!</div><div style="font-size:2rem;font-weight:700;color:#e94560">${quizScore}/${QUIZ.length}</div><div style="color:#a8edea;font-size:1.1rem">${pct}%</div><div style="margin:6px 0;font-size:1rem">${grade}</div><div class="prw"><div class="prb" style="width:${pct}%"></div></div>${certHtml}<button style="margin-top:12px;padding:9px 20px;background:#e94560;border:none;color:#fff;border-radius:10px;cursor:pointer;font-size:.85rem;font-weight:700;font-family:inherit" onclick="area().innerHTML='';showQuizName()">🔄 اعمل الاختبار تاني</button></div>`;
 area().appendChild(d);area().scrollTop=99999;
}

// INIT
switchTab('chat');
</script>
</body>
</html>
