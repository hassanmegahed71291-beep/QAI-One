<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QAI ONE Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Sidebar -->
  <nav id="sidebar">
    <div class="logo">QAI ONE</div>
    <ul>
      <li id="menu-dashboard"><span>📊</span></li>
      <li id="menu-reports"><span>📑</span></li>
      <li id="menu-users"><span>👤</span></li>
      <li id="menu-academy"><span>🎓</span></li>
      <li id="menu-simulation"><span>🧩</span></li>
      <li>
        <span>🌐</span>
        <select id="lang-switch" onchange="setLanguage(this.value)">
          <option value="ar">العربية</option>
          <option value="en">English</option>
        </select>
      </li>
    </ul>
  </nav>

  <!-- Dashboard -->
  <main id="dashboard">
    <h1 id="page-title"></h1>
    <div class="kpi-container">
      <div class="kpi-card" id="kpi-inspections"></div>
      <div class="kpi-card" id="kpi-passrate"></div>
      <div class="kpi-card" id="kpi-defects"></div>
      <div class="kpi-card" id="kpi-capa"></div>
    </div>

    <!-- زر تفاعلي -->
    <button id="action-btn"></button>

    <!-- Charts -->
    <div class="charts">
      <canvas id="inspectionTrend"></canvas>
      <canvas id="statusPie"></canvas>
    </div>

    <!-- Recent Inspections Table -->
    <table class="recent">
      <thead>
        <tr>
          <th id="th-id"></th>
          <th id="th-product"></th>
          <th id="th-supplier"></th>
          <th id="th-status"></th>
          <th id="th-result"></th>
          <th id="th-date"></th>
        </tr>
      </thead>
      <tbody>
        <tr><td>INS-2024-1250</td><td>Wireless Earbuds X1</td><td>ABC Electronics</td><td>Completed</td><td>Pass</td><td>May 31</td></tr>
        <tr><td>INS-2024-1248</td><td>LED Desk Lamp</td><td>Bright Light Co.</td><td>Completed</td><td>Fail</td><td>May 30</td></tr>
      </tbody>
    </table>
  </main>

  <!-- Chart.js Library -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    const messages = {
      ar: {
        title: "لوحة التحكم",
        menu: {dashboard:"الرئيسية",reports:"التقارير",users:"المستخدمين",academy:"الأكاديمية",simulation:"المحاكاة"},
        kpi: {inspections:"📊 إجمالي الفحوصات: 1248 ↑12.5%",passrate:"✅ نسبة النجاح: 96.7% ↑3.2%",defects:"❌ العيوب المكتشفة: 342 ↓8.4%",capa:"⚠️ حالات مفتوحة: 18 ↓10%"},
        button: "ابدأ الفحص",
        table: {id:"الرقم",product:"المنتج",supplier:"المورد",status:"الحالة",result:"النتيجة",date:"التاريخ"}
      },
      en: {
        title: "Dashboard",
        menu: {dashboard:"Dashboard",reports:"Reports",users:"Users",academy:"Academy",simulation:"Simulation"},
        kpi: {inspections:"📊 Total Inspections: 1248 ↑12.5%",passrate:"✅ Pass Rate: 96.7% ↑3.2%",defects:"❌ Defects Found: 342 ↓8.4%",capa:"⚠️ Open CAPA: 18 ↓10%"},
        button: "Start Inspection",
        table: {id:"ID",product:"Product",supplier:"Supplier",status:"Status",result:"Result",date:"Date"}
      }
    };

    function setLanguage(lang) {
      document.getElementById("page-title").innerText = messages[lang].title;
      document.getElementById("menu-dashboard").innerHTML = "📊 " + messages[lang].menu.dashboard;
      document.getElementById("menu-reports").innerHTML = "📑 " + messages[lang].menu.reports;
      document.getElementById("menu-users").innerHTML = "👤 " + messages[lang].menu.users;
      document.getElementById("menu-academy").innerHTML = "🎓 " + messages[lang].menu.academy;
      document.getElementById("menu-simulation").innerHTML = "🧩 " + messages[lang].menu.simulation;

      document.getElementById("kpi-inspections").innerText = messages[lang].kpi.inspections;
      document.getElementById("kpi-passrate").innerText = messages[lang].kpi.passrate;
      document.getElementById("kpi-defects").innerText = messages[lang].kpi.defects;
      document.getElementById("kpi-capa").innerText = messages[lang].kpi.capa;

      document.getElementById("action-btn").innerText = messages[lang].button;

      document.getElementById("th-id").innerText = messages[lang].table.id;
      document.getElementById("th-product").innerText = messages[lang].table.product;
      document.getElementById("th-supplier").innerText = messages[lang].table.supplier;
      document.getElementById("th-status").innerText = messages[lang].table.status;
      document.getElementById("th-result").innerText = messages[lang].table.result;
      document.getElementById("th-date").innerText = messages[lang].table.date;
    }

    // الافتراضي عربي
    setLanguage("ar");

    // Charts
    const ctx1 = document.getElementById('inspectionTrend').getContext('2d');
    new Chart(ctx1, {
      type: 'line',
      data: {
        labels: ['May 1','May 10','May 20','May 30'],
        datasets: [
          { label: 'Inspections', data: [200, 300, 400, 348], borderColor: 'blue', fill: false },
          { label: 'Defects', data: [50, 80, 60, 40], borderColor: 'red', fill: false }
        ]
      }
    });

    const ctx2 = document.getElementById('statusPie').getContext('2d');
    new Chart(ctx2, {
      type: 'pie',
      data: {
        labels: ['Passed','Failed','Pending','In Progress'],
        datasets: [{
          data: [900, 200, 100, 48],
          backgroundColor: ['green','red','orange','blue']
        }]
      }
    });
  </script>
</body>
</html>
