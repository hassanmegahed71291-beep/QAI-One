<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Inspection | QUALIO</title>
<style>
body{margin:0;font-family:Arial;background:#0f172a;color:#fff}
header{background:#111827;padding:20px}
.container{max-width:1100px;margin:auto;padding:30px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px}
.card{background:#1e293b;padding:20px;border-radius:12px}
label{display:block;margin:10px 0 5px}
input,select,textarea{width:100%;padding:10px;border-radius:8px;border:none}
button{margin-top:20px;padding:14px 20px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-weight:bold}
</style></head>
<body>
<header><h2>QUALIO | Final Inspection</h2></header>
<div class="container">
<h1>Inspection Form</h1>
<div class="grid">
<div class="card">
<label>Factory</label><input placeholder="Factory Name">
<label>Customer</label><input placeholder="Customer">
<label>PO Number</label><input placeholder="PO">
<label>Style</label><input placeholder="Style">
</div>
<div class="card">
<label>Inspector</label><input placeholder="Inspector">
<label>AQL Level</label><select><option>1.0</option><option>1.5</option><option selected>2.5</option><option>4.0</option></select>
<label>Inspection Date</label><input type="date">
<label>Remarks</label><textarea rows="5"></textarea>
</div>
</div>
<button>Save Inspection</button>
</div>
</body></html>
